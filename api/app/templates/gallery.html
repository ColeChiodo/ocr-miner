{% for c in captures %}
<div class="gallery-item">
  <a href="/viewer/{{ c.id }}">
    <img src="/captures-files/{{ c.id }}/image.png" alt="" loading="lazy" onerror="this.closest('.gallery-item').style.display='none'">
    <span class="gallery-ts" data-ts="{{ c.timestamp }}"></span>
  </a>
  <button hx-delete="/captures/{{ c.id }}" hx-target="closest .gallery-item" hx-swap="outerHTML" hx-confirm="Delete?" onclick="event.stopPropagation()" class="gallery-del">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
  </button>
</div>
{% endfor %}
{% if has_more %}
<button id="load-more"
        hx-get="/gallery?offset={{ next_offset }}&limit={{ limit }}"
        hx-target="#gallery"
        hx-swap="beforeend"
        class="load-more-btn"
        hx-swap-oob="true">Load more</button>
{% else %}
<div id="load-more" hx-swap-oob="true"></div>
{% endif %}
